<!DOCTYPE html>
<html class="dark" lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>超级大脑 - 系统设置</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
    darkMode: "class",
    theme: { extend: { colors: {
        "primary-container": "#00d4aa", "on-surface-variant": "#a8abb2",
        "surface-variant": "#20262e", "primary": "#49f4c8", "error": "#ff716c",
        "outline-variant": "#44484e", "tertiary": "#ff6e80",
        "surface-container-low": "#0f1419", "surface-container-high": "#1a2027",
        "background": "#0a0f14", "on-surface": "#ebeef5",
        "surface-container": "#151a20", "surface-container-highest": "#20262e",
        "secondary": "#5b9eff", "surface": "#0a0f14"
    }, fontFamily: { "headline": ["Space Grotesk"], "body": ["Manrope"] },
    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" } } }
}
</script>
<style>
.material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
body { background:#070b10; color:#ebeef5; font-family:'Manrope',sans-serif;
    -webkit-font-smoothing:antialiased; -webkit-tap-highlight-color:transparent;
    min-height:100dvh; min-height:100vh; overscroll-behavior-y:contain;
    overflow-x:hidden; touch-action:pan-y; }
.settings-card { background:#0f1520; }
.mono-data { font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace; }
.custom-toggle { position:relative;display:inline-block;width:44px;height:24px;flex-shrink:0; }
.custom-toggle input { opacity:0;width:0;height:0; }
.slider { position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;
    background:#20262e;transition:.3s;border-radius:34px; }
.slider:before { position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;
    background:#ebeef5;transition:.3s;border-radius:50%; }
input:checked + .slider { background:#00d4aa; }
input:checked + .slider:before { transform:translateX(20px); }
.setting-row { min-height:56px; }
.setting-row label.custom-toggle {
    display:inline-flex; align-items:center; justify-content:center;
    min-width:48px; min-height:48px; margin:-8px -4px -8px 0; touch-action:manipulation;
}
.bottom-nav { padding-bottom:max(env(safe-area-inset-bottom),8px); }
main { padding-bottom:calc(76px + max(env(safe-area-inset-bottom),8px)); }
button,a,label,select { -webkit-tap-highlight-color:transparent; }
/* Hero banner - CSS only */
.hero-banner { background:linear-gradient(135deg,#0f1a14 0%,#0a1520 50%,#0f1a1a 100%);
    position:relative;overflow:hidden; }
.hero-banner::before { content:'';position:absolute;top:-40%;right:-20%;width:200px;height:200px;
    background:radial-gradient(circle,rgba(73,244,200,.12) 0%,transparent 70%);border-radius:50%; }
.hero-banner::after { content:'';position:absolute;bottom:-30%;left:10%;width:150px;height:150px;
    background:radial-gradient(circle,rgba(91,158,255,.08) 0%,transparent 70%);border-radius:50%; }
/* Toast */
#toast { position:fixed;top:max(72px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:500;
    background:#1a2235;color:#ebeef5;padding:10px 16px;border-radius:20px;
    font-size:13px;font-weight:600;opacity:0;transition:opacity .2s;
    border:1px solid #44484e;pointer-events:none;max-width:min(92vw,360px);text-align:center;
    line-height:1.35;word-break:break-word; }
#toast.show { opacity:1; }
#toast.err { border-color:rgba(255,113,108,.3);color:#ff716c; }
/* Lock overlay */
#lockOverlay { display:none;position:fixed;inset:0;background:rgba(7,11,16,.95);z-index:300;
    flex-direction:column;align-items:center;justify-content:center;
    padding:32px;padding-bottom:max(32px,env(safe-area-inset-bottom)); }
#lockOverlay.show { display:flex; }
.lock-card { background:#0f1520;border:1px solid #1e2d45;border-radius:20px;
    padding:32px 24px;width:100%;max-width:320px; }
/* Section save button */
.save-btn { display:block;width:100%;margin-top:4px;padding:10px;border-radius:12px;
    background:rgba(73,244,200,.08);border:1px solid rgba(73,244,200,.2);
    color:#49f4c8;font-size:12px;font-weight:700;text-align:center;
    text-transform:uppercase;letter-spacing:.08em;transition:all .2s; }
.save-btn:active { background:rgba(73,244,200,.15); }
</style>
</head>
<body class="font-body">

<div id="toast"></div>

<!-- 锁定遮罩 -->
<div id="lockOverlay">
    <div class="lock-card text-center">
        <div class="w-14 h-14 bg-primary/10 rounded-2xl flex items-center justify-center mx-auto mb-5">
            <span class="material-symbols-outlined text-[40px] text-primary" style="font-variation-settings:'FILL' 1;">lock</span>
        </div>
        <h2 id="lockTitle" class="font-headline text-lg font-bold mb-1">管理员验证</h2>
        <p id="lockDesc" class="text-[12px] text-on-surface-variant mb-6">请输入管理员密码以访问系统设置</p>
        <input id="lockInput" type="password" placeholder="请输入密码"
            class="w-full h-12 px-4 bg-[#1a2235] border border-[#1e2d45] focus:border-primary rounded-[10px] text-on-surface placeholder-[#44484e] outline-none text-base mb-3"
            onkeydown="if(event.key==='Enter')submitLock()"/>
        <div id="lockConfirmWrap" style="display:none;" class="mb-3">
            <input id="lockConfirmInput" type="password" placeholder="再次输入密码"
                class="w-full h-12 px-4 bg-[#1a2235] border border-[#1e2d45] focus:border-primary rounded-[10px] text-on-surface placeholder-[#44484e] outline-none text-base"/>
        </div>
        <p id="lockErr" class="text-[12px] text-error mb-3 min-h-[18px]"></p>
        <button id="lockBtn" onclick="submitLock()"
            class="w-full h-12 bg-gradient-to-r from-primary to-primary-container text-[#070b10] font-bold rounded-xl">
            解锁
        </button>
    </div>
</div>

<!-- 顶部栏 -->
<header class="fixed top-0 w-full z-50 bg-[#0a0f14] shadow-[0_4px_20px_rgba(73,244,200,.05)]"
        style="padding-top:env(safe-area-inset-top);">
    <div class="flex items-center justify-between px-5 h-14 w-full">
        <div class="flex items-center gap-3">
            <button type="button" class="w-10 h-10 flex items-center justify-center active:scale-95 duration-150 touch-manipulation rounded-xl" onclick="lockPage()" aria-label="锁定">
                <span class="material-symbols-outlined text-[#49f4c8]">lock</span>
            </button>
            <h1 class="font-['Space_Grotesk'] text-[#49f4c8] text-base font-bold tracking-tight">系统设置</h1>
        </div>
        <button type="button" class="w-10 h-10 flex items-center justify-center active:scale-95 duration-150 touch-manipulation rounded-xl" onclick="loadAll()" aria-label="刷新">
            <span class="material-symbols-outlined text-[#49f4c8]">refresh</span>
        </button>
    </div>
</header>

<main class="pt-14 pb-28 px-4 sm:px-5 max-w-lg mx-auto w-full min-w-0 space-y-6">

    <!-- 版本横幅 -->
    <section class="mt-4">
        <div class="hero-banner h-28 w-full rounded-2xl">
            <div class="relative z-10 h-full flex flex-col justify-end p-4">
                <div class="text-[10px] font-bold text-primary uppercase tracking-[.2em] mb-1">Status: Operational</div>
                <div class="font-headline text-xl font-bold text-on-surface">超级大脑 <span class="text-primary">v2.4.0</span></div>
            </div>
        </div>
    </section>

    <!-- 交易控制 -->
    <section>
        <h2 class="px-1 mb-3 text-xs font-bold uppercase tracking-widest text-on-surface-variant font-headline">交易控制</h2>
        <div class="settings-card rounded-2xl overflow-hidden">
            <div class="setting-row flex items-center justify-between px-4 border-b border-outline-variant/10">
                <div class="flex flex-col py-3 pr-4">
                    <span class="text-sm font-medium">实盘交易</span>
                    <span class="text-[10px] text-on-surface-variant mt-0.5">Live Trading execution engine</span>
                </div>
                <label class="custom-toggle"><input id="liveToggle" type="checkbox" onchange="autoSave('services')"/><span class="slider"></span></label>
            </div>
            <div class="setting-row flex items-center justify-between px-4 border-b border-outline-variant/10">
                <div class="flex flex-col py-3 pr-4">
                    <span class="text-sm font-medium">U本位自动交易</span>
                    <span class="text-[10px] text-on-surface-variant mt-0.5">USDT-M Auto Execution</span>
                </div>
                <label class="custom-toggle"><input id="usdtToggle" type="checkbox" onchange="autoSave('services')"/><span class="slider"></span></label>
            </div>
        </div>
    </section>

    <!-- 过滤器 -->
    <section>
        <h2 class="px-1 mb-3 text-xs font-bold uppercase tracking-widest text-on-surface-variant font-headline">过滤器</h2>
        <div class="settings-card rounded-2xl overflow-hidden">
            <div class="setting-row flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between px-4 py-1">
                <div class="flex flex-col py-2 min-w-0 pr-2">
                    <span class="text-sm font-medium">最大持仓时间</span>
                    <span class="text-[10px] text-on-surface-variant mt-0.5 leading-snug">与桌面系统配置一致，范围 3～8 小时</span>
                </div>
                <select id="holdHours" onchange="autoSave('holdHours')" aria-label="最大持仓小时数"
                    class="bg-surface-container-highest text-on-surface text-sm rounded-xl border-none focus:ring-2 focus:ring-primary/50 h-11 min-h-[44px] px-4 font-body mono-data w-full sm:w-auto sm:min-w-[100px] sm:ml-4 flex-shrink-0 touch-manipulation">
                    <option value="3">3 小时</option>
                    <option value="4">4 小时</option>
                    <option value="5">5 小时</option>
                    <option value="6">6 小时</option>
                    <option value="7">7 小时</option>
                    <option value="8">8 小时</option>
                </select>
            </div>
        </div>
    </section>

    <!-- 多空方向摘要 -->
    <section>
        <h2 class="px-1 mb-3 text-xs font-bold uppercase tracking-widest text-on-surface-variant font-headline">方向摘要</h2>
        <div class="settings-card rounded-xl px-4 py-4">
            <p id="directionSummary" class="text-sm font-semibold text-primary">--</p>
        </div>
    </section>

    <!-- 系统状态 -->
    <section>
        <h2 class="px-1 mb-3 text-xs font-bold uppercase tracking-widest text-on-surface-variant font-headline">系统状态</h2>
        <div class="settings-card rounded-2xl overflow-hidden">
            <div class="setting-row flex items-center justify-between px-4 border-b border-outline-variant/10">
                <span class="text-sm font-medium">U本位引擎</span>
                <span id="usdtStatus" class="px-3 py-1.5 text-[10px] font-bold uppercase tracking-tight rounded-full border bg-primary/10 text-primary border-primary/20">--</span>
            </div>
            <div class="setting-row flex items-center justify-between px-4 border-b border-outline-variant/10">
                <span class="text-sm font-medium">实盘交易</span>
                <span id="liveStatus" class="px-3 py-1.5 text-[10px] font-bold uppercase tracking-tight rounded-full border bg-primary/10 text-primary border-primary/20">--</span>
            </div>
            <div class="setting-row flex items-center justify-between px-4">
                <span class="text-sm font-medium">预测器</span>
                <span id="predictorStatus" class="px-3 py-1.5 text-[10px] font-bold uppercase tracking-tight rounded-full border bg-primary/10 text-primary border-primary/20">--</span>
            </div>
        </div>
    </section>

    <div class="text-center pb-4 opacity-20">
        <span class="text-[10px] font-headline uppercase tracking-[.4em]">Neural Network Node 0x7E...4A</span>
    </div>
</main>

<!-- 底部导航 -->
<nav class="bottom-nav fixed bottom-0 w-full z-50 rounded-t-2xl bg-[#0f1419]/90 backdrop-blur-xl border-t border-[#44484e]/20 shadow-[0_-8px_32px_rgba(0,0,0,.4)]">
    <div class="flex justify-around items-center h-[68px] w-full">
        <a class="flex flex-col items-center justify-center text-[#49f4c8] drop-shadow-[0_0_8px_rgba(73,244,200,.4)] min-w-[64px] h-full" href="/m/settings">
            <span class="material-symbols-outlined text-[22px] mb-0.5" style="font-variation-settings:'FILL' 1;">settings</span>
            <span class="text-[10px] font-semibold uppercase tracking-wide">设置</span>
        </a>
        <a class="flex flex-col items-center justify-center text-[#a8abb2] hover:text-[#49f4c8] transition-colors min-w-[64px] h-full" href="/m/futures">
            <span class="material-symbols-outlined text-[22px] mb-0.5">candlestick_chart</span>
            <span class="text-[10px] font-semibold uppercase tracking-wide">U本位</span>
        </a>
        <a class="flex flex-col items-center justify-center text-[#a8abb2] hover:text-[#49f4c8] transition-colors min-w-[64px] h-full" href="/m/live">
            <span class="material-symbols-outlined text-[22px] mb-0.5">sensors</span>
            <span class="text-[10px] font-semibold uppercase tracking-wide">实盘</span>
        </a>
    </div>
</nav>

<script>
const SYS = '/api/system';
const SESSION_KEY = 'admin_unlocked';
let _lockMode = 'verify';
let _saving = {};   // debounce flags

function toast(msg, type='ok') {
    const el = document.getElementById('toast');
    el.textContent = msg; el.className = 'show ' + type;
    setTimeout(() => el.className = '', 2200);
}

// ── Lock ─────────────────────────────────────────────────────────────
function isUnlocked() { return sessionStorage.getItem(SESSION_KEY) === '1'; }
function lockPage() {
    sessionStorage.removeItem(SESSION_KEY);
    document.getElementById('lockOverlay').classList.add('show');
    document.getElementById('lockInput').value = '';
    document.getElementById('lockErr').textContent = '';
    setTimeout(() => document.getElementById('lockInput').focus(), 100);
}
function unlockPage() {
    sessionStorage.setItem(SESSION_KEY, '1');
    document.getElementById('lockOverlay').classList.remove('show');
}
function requireUnlock() {
    if (!isUnlocked()) { toast('请先解锁', 'err'); return false; }
    return true;
}

async function checkPasswordExists() {
    try {
        const r = await fetch(`${SYS}/admin/verify-password`, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ password: '' })
        }).then(r => r.json());
        return !r.needs_setup;
    } catch { return true; }
}

async function submitLock() {
    const btn = document.getElementById('lockBtn');
    const errEl = document.getElementById('lockErr');
    errEl.textContent = '';
    if (_lockMode === 'setup') {
        const pwd = document.getElementById('lockInput').value;
        const conf = document.getElementById('lockConfirmInput').value;
        if (!pwd) { errEl.textContent = '请输入密码'; return; }
        if (pwd !== conf) { errEl.textContent = '两次密码不一致'; return; }
        btn.textContent = '设置中…'; btn.disabled = true;
        const r = await fetch(`${SYS}/admin/set-password`, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ new_password: pwd })
        }).then(r => r.json());
        btn.disabled = false; btn.textContent = '确认';
        if (r.success) { toast('管理员密码已设置'); unlockPage(); }
        else errEl.textContent = r.error || '设置失败';
    } else {
        const pwd = document.getElementById('lockInput').value;
        if (!pwd) { errEl.textContent = '请输入密码'; return; }
        btn.textContent = '验证中…'; btn.disabled = true;
        const r = await fetch(`${SYS}/admin/verify-password`, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ password: pwd })
        }).then(r => r.json());
        btn.disabled = false;
        if (r.success) { unlockPage(); }
        else if (r.needs_setup) {
            _lockMode = 'setup';
            document.getElementById('lockTitle').textContent = '首次设置密码';
            document.getElementById('lockDesc').textContent = '请设置管理员密码（至少4位）';
            document.getElementById('lockConfirmWrap').style.display = 'block';
            document.getElementById('lockInput').placeholder = '新密码';
            btn.textContent = '确认';
        } else {
            errEl.textContent = r.error || '密码错误';
            btn.textContent = '解锁';
            document.getElementById('lockInput').value = '';
            document.getElementById('lockInput').focus();
        }
    }
}
document.getElementById('lockInput').addEventListener('keydown', e => { if (e.key === 'Enter') submitLock(); });

// ── Status pill helper ────────────────────────────────────────────────
function setPill(id, on) {
    const el = document.getElementById(id);
    if (!el) return;
    if (on) { el.className = 'px-3 py-1.5 text-[10px] font-bold uppercase tracking-tight rounded-full border bg-primary/10 text-primary border-primary/20'; el.textContent = '运行中'; }
    else     { el.className = 'px-3 py-1.5 text-[10px] font-bold uppercase tracking-tight rounded-full border bg-error/10 text-error border-error/20'; el.textContent = '已停止'; }
}

function updateDirectionSummary() {
    const l = document.getElementById('longToggle').checked;
    const s = document.getElementById('shortToggle').checked;
    const map = {'tt':'多空双向','tf':'仅做多','ft':'仅做空','ff':'停止交易'};
    document.getElementById('directionSummary').textContent = map[(l?'t':'f')+(s?'t':'f')];
}

// ── Load ──────────────────────────────────────────────────────────────
async function loadAll() {
    try {
        const [sysR, dirR, svcR, holdR] = await Promise.all([
            fetch(`${SYS}/settings`).then(r => r.json()),
            fetch(`${SYS}/trading-direction`).then(r => r.json()),
            fetch(`${SYS}/trading-services`).then(r => r.json()),
            fetch(`${SYS}/max-hold-hours`).then(r => r.json()),
        ]);
        if (sysR.success) {
            const b4 = sysR.data.big4_filter_enabled?.value === 'true';
            document.getElementById('big4Toggle').checked = b4;
        }
        if (dirR.success) {
            const l = dirR.data.allow_long.value === true || dirR.data.allow_long.value === 'true';
            const s = dirR.data.allow_short.value === true || dirR.data.allow_short.value === 'true';
            document.getElementById('longToggle').checked = l;
            document.getElementById('shortToggle').checked = s;
            updateDirectionSummary();
        }
        if (svcR.success) {
            const d = svcR.data;
            document.getElementById('usdtToggle').checked = d.usdt_futures_enabled;
            document.getElementById('coinToggle').checked = d.coin_futures_enabled;
            document.getElementById('liveToggle').checked = d.live_trading_enabled;
            document.getElementById('predictorToggle').checked = d.predictor_enabled;
            document.getElementById('btcMomentumToggle').checked = d.btc_momentum_enabled;
            document.getElementById('uCoinStyleToggle').checked = d.u_coin_style_enabled || false;
            setPill('usdtStatus', d.usdt_futures_enabled);
            setPill('liveStatus', d.live_trading_enabled);
            setPill('predictorStatus', d.predictor_enabled);
        }
        if (holdR.success) {
            const h = Math.max(3, Math.min(8, parseInt(holdR.data.hours, 10) || 4));
            const sel = document.getElementById('holdHours');
            sel.value = String(h);
        }
    } catch(e) { toast('加载失败: ' + e.message, 'err'); }
}

// ── Auto-save on toggle (debounced 500ms) ─────────────────────────────
function autoSave(type) {
    if (!requireUnlock()) {
        // 回滚 toggle（因为没解锁）—— 需要重新读取状态
        setTimeout(loadAll, 50);
        return;
    }
    clearTimeout(_saving[type]);
    _saving[type] = setTimeout(() => save(type), 500);
}

async function save(type) {
    if (type === 'services') {
        const body = {
            usdt_futures_enabled: document.getElementById('usdtToggle').checked,
            coin_futures_enabled: document.getElementById('coinToggle').checked,
            live_trading_enabled: document.getElementById('liveToggle').checked,
            predictor_enabled: document.getElementById('predictorToggle').checked,
            btc_momentum_enabled: document.getElementById('btcMomentumToggle').checked,
            u_coin_style_enabled: document.getElementById('uCoinStyleToggle').checked,
        };
        const r = await fetch(`${SYS}/trading-services`, {
            method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)
        }).then(r => r.json());
        if (r.success) { toast('服务设置已保存'); loadAll(); }
        else toast('保存失败', 'err');
    } else if (type === 'direction') {
        const body = {
            allow_long: document.getElementById('longToggle').checked,
            allow_short: document.getElementById('shortToggle').checked,
        };
        const r = await fetch(`${SYS}/trading-direction`, {
            method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)
        }).then(r => r.json());
        if (r.success) { toast('方向设置已保存'); updateDirectionSummary(); }
        else toast('保存失败', 'err');
    } else if (type === 'big4') {
        const enabled = document.getElementById('big4Toggle').checked;
        const r = await fetch(`${SYS}/big4-filter`, {
            method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ enabled })
        }).then(r => r.json());
        if (r.success) toast('Big4设置已保存');
        else toast('保存失败', 'err');
    } else if (type === 'holdHours') {
        const hours = Math.max(3, Math.min(8, parseInt(document.getElementById('holdHours').value, 10) || 4));
        const r = await fetch(`${SYS}/max-hold-hours`, {
            method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ hours })
        }).then(r => r.json());
        if (r.success) toast(`持仓时间已设为 ${hours} 小时`);
        else toast('保存失败', 'err');
    }
}

// ── Init ──────────────────────────────────────────────────────────────
async function initLock() {
    if (isUnlocked()) { unlockPage(); return; }
    const exists = await checkPasswordExists();
    if (!exists) {
        _lockMode = 'setup';
        document.getElementById('lockTitle').textContent = '首次设置密码';
        document.getElementById('lockDesc').textContent = '请设置管理员密码以保护系统设置（至少4位）';
        document.getElementById('lockConfirmWrap').style.display = 'block';
        document.getElementById('lockInput').placeholder = '新密码';
        document.getElementById('lockBtn').textContent = '确认';
    }
    document.getElementById('lockOverlay').classList.add('show');
    setTimeout(() => document.getElementById('lockInput').focus(), 100);
}

initLock();
loadAll();
</script>
</body>
</html>
