<!DOCTYPE html>
<html class="dark" lang="zh">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>红黑天鹅榜 - Gemini 决策板</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@200;300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            background: "#0a0f14",
            "surface-dim": "#0a0f14",
            "surface-container-lowest": "#000000",
            "surface-container-low": "#0f1419",
            "surface-container": "#151a20",
            "surface-container-high": "#1b2128",
            "surface-container-highest": "#20262e",
            "surface-bright": "#262d35",
            outline: "#72767c",
            "outline-variant": "#3a3f47",
            primary: "#49f4c8",
            "primary-dim": "#33e5ba",
            "on-surface": "#e5e7ea",
            "on-surface-variant": "#a8abb2",
            tertiary: "#ff6e80",
            "tertiary-dim": "#ff7987",
            error: "#ff716c",
            "error-dim": "#d7383b",
            "swan-red-bg": "rgba(255, 110, 128, 0.06)",
            "swan-black-bg": "rgba(168, 171, 178, 0.05)",
          },
          fontFamily: {
            display: ["Space Grotesk", "system-ui", "sans-serif"],
            body: ["Manrope", "system-ui", "sans-serif"],
            mono: ["JetBrains Mono", "monospace"],
          },
        },
      },
    };
  </script>
  <style>
    body { font-family: "Manrope", system-ui, sans-serif; }
    h1, h2, h3 { font-family: "Space Grotesk", system-ui, sans-serif; }
    .mono { font-family: "JetBrains Mono", monospace; }
    .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; }

    /* 卡片 level 边框样式 */
    .level-strong { border-color: rgba(73, 244, 200, 0.45); box-shadow: 0 0 0 1px rgba(73, 244, 200, 0.18) inset; }
    .level-moderate { border-color: rgba(168, 171, 178, 0.35); border-style: dashed; }
    .level-weak { border-color: rgba(168, 171, 178, 0.18); border-style: dotted; opacity: 0.85; }

    /* 类别色调 */
    .cat-red-swan { background: linear-gradient(180deg, rgba(255, 110, 128, 0.08), rgba(255, 110, 128, 0.02)); }
    .cat-black-swan { background: linear-gradient(180deg, rgba(40, 44, 52, 0.5), rgba(15, 20, 25, 0.3)); }

    .conf-bar {
      height: 4px;
      background: linear-gradient(90deg, var(--bar-from, #ff6e80), var(--bar-to, #ff6e80));
      border-radius: 999px;
    }
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1b2128; color: #e5e7ea; padding: 10px 18px; border-radius: 8px;
      font-size: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      transition: opacity 0.3s; z-index: 100;
    }
    .toast.hidden { opacity: 0; pointer-events: none; }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }
  </style>
</head>

<body class="bg-background text-on-surface min-h-screen">
  <!-- ==================== HEADER ==================== -->
  <header class="border-b border-outline-variant bg-surface-container-low/80 backdrop-blur sticky top-0 z-30">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between flex-wrap gap-3">
      <div>
        <h1 class="text-2xl font-bold tracking-tight flex items-center gap-2">
          <span class="material-symbols-outlined text-primary">radar</span>
          红黑天鹅榜
        </h1>
        <p class="text-xs text-on-surface-variant mt-0.5">
          Gemini 每 2 小时基于实时市场异动 (24h 涨跌 + 资金费率极值) 自动判定 ·
          <span id="hdr-asof" class="mono">--</span>
          <span id="hdr-ago" class="text-on-surface-variant"></span>
        </p>
      </div>
      <div class="flex items-center gap-2">
        <button id="btn-trigger"
          class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md bg-primary/15 hover:bg-primary/25
                 text-primary text-sm font-medium border border-primary/30 transition">
          <span id="btn-trigger-icon" class="material-symbols-outlined text-base">play_arrow</span>
          <span id="btn-trigger-text">立即重跑</span>
        </button>
        <button id="btn-refresh"
          class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md bg-surface-container hover:bg-surface-bright
                 text-on-surface text-sm border border-outline-variant transition">
          <span class="material-symbols-outlined text-base">refresh</span>
          刷新
        </button>
      </div>
    </div>
  </header>

  <!-- ==================== SUMMARY BAR ==================== -->
  <section class="max-w-7xl mx-auto px-4 sm:px-6 pt-4">
    <div id="summary-card"
      class="rounded-lg border border-outline-variant bg-surface-container/60 p-4 hidden">
      <div class="flex items-start gap-3">
        <span class="material-symbols-outlined text-on-surface-variant mt-0.5">psychology</span>
        <div class="flex-1">
          <div class="text-xs text-on-surface-variant uppercase tracking-wide mb-1">Gemini 整体总评</div>
          <p id="summary-text" class="text-sm leading-relaxed">--</p>
          <div id="summary-counts" class="mt-2 flex flex-wrap gap-2 text-xs"></div>
        </div>
      </div>
    </div>
    <div id="empty-card"
      class="rounded-lg border border-dashed border-outline-variant bg-surface-container/40 p-8 text-center hidden">
      <span class="material-symbols-outlined text-4xl text-on-surface-variant">hourglass_empty</span>
      <p class="mt-2 text-sm text-on-surface-variant">
        暂无数据。后台每 2 小时跑一次 Gemini 决策。点上方「立即重跑」可手动触发一次。
      </p>
    </div>
  </section>

  <!-- ==================== TWO-COLUMN BOARD ==================== -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6">
      <!-- 红天鹅 -->
      <section class="rounded-xl border border-tertiary/30 bg-swan-red-bg p-4">
        <header class="flex items-center justify-between mb-3 pb-2 border-b border-tertiary/20">
          <div class="flex items-center gap-2">
            <span class="text-xl">🔥</span>
            <h2 class="text-lg font-semibold text-tertiary">红天鹅 · Red Swan</h2>
            <span id="red-count" class="text-xs text-on-surface-variant">--</span>
          </div>
          <span class="text-xs text-on-surface-variant">极端正向尾部 / 暴涨 / 空头挤压</span>
        </header>
        <div id="red-list" class="space-y-3"></div>
      </section>

      <!-- 黑天鹅 -->
      <section class="rounded-xl border border-outline/40 bg-swan-black-bg p-4">
        <header class="flex items-center justify-between mb-3 pb-2 border-b border-outline/30">
          <div class="flex items-center gap-2">
            <span class="text-xl">🌑</span>
            <h2 class="text-lg font-semibold text-on-surface">黑天鹅 · Black Swan</h2>
            <span id="black-count" class="text-xs text-on-surface-variant">--</span>
          </div>
          <span class="text-xs text-on-surface-variant">极端负向尾部 / 急跌 / 多头踩踏</span>
        </header>
        <div id="black-list" class="space-y-3"></div>
      </section>
    </div>

    <!-- 折叠的 WEAK 信号 -->
    <details id="weak-section" class="mt-6 rounded-lg bg-surface-container/40 border border-outline-variant/50 hidden">
      <summary class="cursor-pointer px-4 py-3 text-sm text-on-surface-variant hover:text-on-surface flex items-center gap-2">
        <span class="material-symbols-outlined text-base">expand_more</span>
        低置信信号 (<span id="weak-count">0</span>) · 仅单轮出现, 噪声较高
      </summary>
      <div id="weak-list" class="px-4 pb-4 space-y-2"></div>
    </details>
  </main>

  <!-- ==================== TOAST ==================== -->
  <div id="toast" class="toast hidden"></div>

  <!-- ==================== JS ==================== -->
  <script>
    const $ = (id) => document.getElementById(id);
    const fmtPct = (v) => (v == null ? "--" : (v >= 0 ? "+" : "") + Number(v).toFixed(2) + "%");
    const fmtRate = (v) => (v == null ? "--" : (v * 100).toFixed(4) + "%");
    const fmtVol = (v) => {
      if (v == null) return "--";
      v = Number(v);
      if (v >= 1e9) return (v / 1e9).toFixed(2) + "B";
      if (v >= 1e6) return (v / 1e6).toFixed(2) + "M";
      if (v >= 1e3) return (v / 1e3).toFixed(2) + "K";
      return v.toFixed(0);
    };

    function timeAgo(iso) {
      if (!iso) return "";
      const t = new Date(iso + (iso.endsWith("Z") ? "" : "Z")).getTime();
      const diff = (Date.now() - t) / 1000;
      if (diff < 60) return Math.floor(diff) + " 秒前";
      if (diff < 3600) return Math.floor(diff / 60) + " 分钟前";
      if (diff < 86400) return Math.floor(diff / 3600) + " 小时前";
      return Math.floor(diff / 86400) + " 天前";
    }

    function levelBadge(level) {
      const map = {
        STRONG: "level-strong text-primary",
        MODERATE: "level-moderate text-on-surface-variant",
        WEAK: "level-weak text-on-surface-variant",
      };
      return `<span class="text-[10px] mono px-1.5 py-0.5 rounded border ${map[level] || ''}">${level}</span>`;
    }

    function confBar(v, color) {
      const pct = Math.max(0, Math.min(1, Number(v) || 0)) * 100;
      return `
        <div class="flex items-center gap-2 text-xs">
          <div class="flex-1 conf-bar relative" style="--bar-from:${color};--bar-to:${color};">
            <div style="position:absolute;left:0;top:0;height:100%;width:${pct}%;background:${color};border-radius:999px;"></div>
            <div style="position:absolute;left:0;top:0;height:100%;width:100%;background:rgba(255,255,255,0.05);border-radius:999px;"></div>
          </div>
          <span class="mono text-on-surface w-9 text-right">${(Number(v) || 0).toFixed(2)}</span>
        </div>`;
    }

    function triggerLabel(t) {
      return ({
        "24h_gainer": "24h 大涨",
        "24h_loser": "24h 大跌",
        "funding_pos_extreme": "资金费 极正",
        "funding_neg_extreme": "资金费 极负",
      }[t]) || t;
    }

    function renderCard(v, isRed) {
      const color = isRed ? "#ff6e80" : "#a8abb2";
      const bgClass = isRed ? "cat-red-swan" : "cat-black-swan";
      const ud = v.universe_data || {};
      const triggers = (v.triggers || []).map(t => `
        <span class="inline-block text-[10px] px-1.5 py-0.5 rounded bg-surface-container/80 text-on-surface-variant">
          ${triggerLabel(t)}
        </span>`).join("");
      const consistency = `${v.black_count + v.red_count}/${v.rounds_total}`;

      const dataLine = [];
      if (ud.change_24h != null) dataLine.push(`24h ${fmtPct(ud.change_24h)}`);
      if (ud.current_rate != null) dataLine.push(`资金费 ${fmtRate(ud.current_rate)}`);
      if (ud.quote_volume_24h != null) dataLine.push(`量 ${fmtVol(ud.quote_volume_24h)}`);
      if (ud.current_price != null) dataLine.push(`价 ${ud.current_price}`);

      return `
        <div class="rounded-lg border ${v.consistency_level === 'STRONG' ? 'level-strong' : v.consistency_level === 'MODERATE' ? 'level-moderate' : 'level-weak'} ${bgClass} p-3 transition hover:border-primary/40">
          <div class="flex items-center justify-between mb-1.5">
            <div class="flex items-center gap-2">
              <span class="font-display text-base font-semibold">${v.symbol}</span>
              ${levelBadge(v.consistency_level)}
              <span class="text-[10px] text-on-surface-variant mono">${consistency}</span>
            </div>
            <div class="text-xs mono" style="color:${color};">★ ${v.avg_confidence.toFixed(2)}</div>
          </div>
          ${confBar(v.avg_confidence, color)}
          <div class="mt-2 text-[11px] mono text-on-surface-variant">${dataLine.join(" · ")}</div>
          ${v.catalyst ? `<p class="mt-2 text-sm leading-snug text-on-surface">${v.catalyst}</p>` : ""}
          ${v.data_signal ? `<p class="mt-1 text-[11px] text-on-surface-variant"><span class="opacity-60">信号:</span> ${v.data_signal}</p>` : ""}
          ${v.risk_note ? `<p class="mt-1 text-[11px] text-on-surface-variant"><span class="opacity-60">风险:</span> ${v.risk_note}</p>` : ""}
          ${triggers ? `<div class="mt-2 flex flex-wrap gap-1">${triggers}</div>` : ""}
        </div>`;
    }

    function showToast(msg, ms = 2500) {
      const el = $("toast");
      el.textContent = msg;
      el.classList.remove("hidden");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => el.classList.add("hidden"), ms);
    }

    async function loadLatest() {
      try {
        const resp = await fetch("/api/gemini-swan/latest", { cache: "no-store" });
        if (!resp.ok) throw new Error("HTTP " + resp.status);
        const data = await resp.json();
        renderAll(data);
      } catch (e) {
        showToast("加载失败: " + e.message);
      }
    }

    function renderAll(data) {
      const run = data.run;
      const verdicts = data.verdicts || [];
      const summary = data.summary || {};

      // header
      if (run) {
        $("hdr-asof").textContent = (run.asof_utc || "").replace("T", " ").substring(0, 16) + " UTC";
        $("hdr-ago").textContent = " (" + timeAgo(run.asof_utc) + ")";
      } else {
        $("hdr-asof").textContent = "--";
        $("hdr-ago").textContent = "";
      }

      // summary
      if (run && run.summary_zh) {
        $("summary-card").classList.remove("hidden");
        $("empty-card").classList.add("hidden");
        $("summary-text").textContent = run.summary_zh;
        const counts = [];
        const mk = (label, n, cls) => n > 0
          ? `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded ${cls}">${label} ${n}</span>` : "";
        counts.push(mk("🔥 红 STRONG", summary.red_strong, "bg-tertiary/15 text-tertiary"));
        counts.push(mk("🔥 红 MODERATE", summary.red_moderate, "bg-tertiary/8 text-tertiary/80"));
        counts.push(mk("🌑 黑 STRONG", summary.black_strong, "bg-outline/15 text-on-surface"));
        counts.push(mk("🌑 黑 MODERATE", summary.black_moderate, "bg-outline/8 text-on-surface-variant"));
        $("summary-counts").innerHTML = counts.filter(Boolean).join(" ");
      } else {
        $("summary-card").classList.add("hidden");
        $("empty-card").classList.remove("hidden");
      }

      // split into red / black / weak
      const reds = verdicts.filter(v => v.main_category === "red_swan" && v.consistency_level !== "WEAK");
      const blacks = verdicts.filter(v => v.main_category === "black_swan" && v.consistency_level !== "WEAK");
      const weaks = verdicts.filter(v => v.consistency_level === "WEAK");

      const redCount = `(${reds.length})`;
      const blackCount = `(${blacks.length})`;
      $("red-count").textContent = redCount;
      $("black-count").textContent = blackCount;

      $("red-list").innerHTML = reds.length
        ? reds.map(v => renderCard(v, true)).join("")
        : `<p class="text-sm text-on-surface-variant text-center py-6 italic">本轮没有稳定的红天鹅信号</p>`;
      $("black-list").innerHTML = blacks.length
        ? blacks.map(v => renderCard(v, false)).join("")
        : `<p class="text-sm text-on-surface-variant text-center py-6 italic">本轮没有稳定的黑天鹅信号</p>`;

      if (weaks.length) {
        $("weak-section").classList.remove("hidden");
        $("weak-count").textContent = weaks.length;
        $("weak-list").innerHTML = weaks.map(v => renderCard(v, v.main_category === "red_swan")).join("");
      } else {
        $("weak-section").classList.add("hidden");
      }
    }

    // ----- 立即重跑 -----
    let triggerPolling = null;
    async function triggerNow() {
      const btn = $("btn-trigger");
      const icon = $("btn-trigger-icon");
      const text = $("btn-trigger-text");
      btn.disabled = true;
      icon.classList.add("spin");
      icon.textContent = "autorenew";
      text.textContent = "排队中...";
      try {
        const resp = await fetch("/api/gemini-swan/trigger", { method: "POST" });
        const data = await resp.json();
        if (!data.accepted) {
          showToast(data.message || "已有任务在跑");
        } else {
          showToast("已触发, 后台跑约 3 分钟...");
        }
        text.textContent = "运行中...";
        // poll every 10s
        clearInterval(triggerPolling);
        triggerPolling = setInterval(checkTriggerStatus, 10000);
      } catch (e) {
        showToast("触发失败: " + e.message);
        resetTriggerBtn();
      }
    }
    async function checkTriggerStatus() {
      try {
        const resp = await fetch("/api/gemini-swan/trigger/status");
        const s = await resp.json();
        if (!s.running) {
          clearInterval(triggerPolling);
          triggerPolling = null;
          resetTriggerBtn();
          showToast(s.last_status === "success" ? "运行完成, 数据已更新" : "运行失败, 详见日志");
          await loadLatest();
        }
      } catch (e) {
        // ignore network blips
      }
    }
    function resetTriggerBtn() {
      const btn = $("btn-trigger");
      const icon = $("btn-trigger-icon");
      const text = $("btn-trigger-text");
      btn.disabled = false;
      icon.classList.remove("spin");
      icon.textContent = "play_arrow";
      text.textContent = "立即重跑";
    }

    // ----- init -----
    document.addEventListener("DOMContentLoaded", () => {
      $("btn-trigger").addEventListener("click", triggerNow);
      $("btn-refresh").addEventListener("click", loadLatest);
      loadLatest();
      // 60s 自动刷新最新数据
      setInterval(loadLatest, 60000);
      // 启动时检查是否有任务在跑
      checkTriggerStatus();
    });
  </script>
</body>
</html>
