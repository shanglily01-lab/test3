专注“确定性”更高的时机：小币种大部分时间都在震荡或被操纵。只交易那些真正出现明确趋势、伴随巨量且有基本面催化的时刻，而不是试图抓住每一个波动。
极度耐心与空仓等待：对于小币种，空仓等待比盲目交易更重要。大部分小币种都是噪音，真正能赚钱的机会凤毛麟角。
质疑你所见到的“机会”：当你看到一个暴涨的小币种，或一个“绝佳”的入场点时，先问自己：这是庄家在诱惑我吗？这个市场深度能支撑我的交易吗？
